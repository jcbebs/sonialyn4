<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>HCI Final Exam Practice Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:2rem;
    margin-bottom:10px;
}

.title p{
    color:#cbd5e1;
}

.tabs{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.tab-btn{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.tab-btn:hover,
.tab-btn.active{
    background:#3b82f6;
}

.quiz-section{
    display:none;
}

.quiz-section.active{
    display:block;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:18px;
    margin-bottom:18px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.question{
    font-size:1.05rem;
    margin-bottom:15px;
    font-weight:bold;
}

.option{
    background:#334155;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#475569;
}

.answer{
    margin-top:12px;
    padding:12px;
    background:#0f766e;
    border-radius:10px;
    display:none;
}

.show-btn{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.show-btn:hover{
    background:#1d4ed8;
}

@media(max-width:768px){
    .title h1{
        font-size:1.5rem;
    }

    .question{
        font-size:1rem;
    }

    .tab-btn{
        width:100%;
    }
}
</style>
</head>

<script>
function toggleAnswer(button){
    const answer = button.nextElementSibling;
    if(answer.style.display === "block"){
        answer.style.display = "none";
        button.innerText = "Show Answer";
    } else {
        answer.style.display = "block";
        button.innerText = "Hide Answer";
    }
}

function showTab(tabId, btn){
    const sections = document.querySelectorAll('.quiz-section');
    const buttons = document.querySelectorAll('.tab-btn');

    sections.forEach(sec => sec.classList.remove('active'));
    buttons.forEach(b => b.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}
</script>
