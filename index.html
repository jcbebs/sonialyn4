
<style>
.qw{padding:1rem 0;font-family:var(--font-sans)}
.sec-hdr{font-size:18px;font-weight:500;color:var(--color-text-primary);margin:2rem 0 4px;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-secondary)}
.sec-sub{font-size:12px;color:var(--color-text-secondary);margin-bottom:1.2rem}
.qcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.qnum{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.05em;margin-bottom:4px}
.qtxt{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:5px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-primary);background:transparent}
.opt:hover{background:var(--color-background-secondary)}
.opt.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11}
.opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.opt.show-correct{background:#EAF3DE;border-color:#639922;color:#3B6D11}
.ol{font-weight:500;min-width:16px}
.fb{font-size:12px;margin-top:7px;padding:6px 10px;border-radius:var(--border-radius-md);display:none;line-height:1.5}
.fb.c{background:#EAF3DE;color:#3B6D11;display:block}
.fb.w{background:#FCEBEB;color:#791F1F;display:block}
.sbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-secondary);padding:10px 0;display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.spill{font-size:13px;background:var(--color-background-secondary);padding:4px 12px;border-radius:20px;color:var(--color-text-secondary)}
.snum{font-weight:500;color:var(--color-text-primary)}
.pbar{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}

/* QUIZ CONTAINER */
.qw{
    max-width: 1000px;
    margin: 40px auto;
    padding: 25px;
    background: #ffffff;
    border: 1px solid #dcdcdc;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* SECTION HEADER */
.sec-hdr{
    font-size: 20px;
    font-weight: 700;
    color: #222;
    margin-top: 35px;
    padding-bottom: 10px;
    border-bottom: 2px solid #ececec;
}

.sec-sub{
    font-size: 13px;
    color: #777;
    margin-bottom: 18px;
}

/* SCORE BAR */
.sbar{
    background: #f8f8f8;
    border: 1px solid #e5e5e5;
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.spill{
    background: #ffffff;
    border: 1px solid #dddddd;
    padding: 7px 14px;
    border-radius: 30px;
    font-size: 13px;
    color: #555;
}

.snum{
    font-weight: 700;
    color: #111;
}

.pbar{
    flex: 1;
    min-width: 180px;
    height: 10px;
    background: #e7e7e7;
    border-radius: 20px;
    overflow: hidden;
}

.pfill{
    height: 100%;
    background: linear-gradient(90deg,#4CAF50,#7ED957);
    border-radius: 20px;
    transition: width 0.3s ease;
}

/* RESET BUTTON */
.sbar button{
    border: none;
    background: #111827;
    color: white;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.sbar button:hover{
    background: #1f2937;
    transform: translateY(-1px);
}

/* TABS */
.tabs{
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.tab{
    border: 1px solid #d9d9d9;
    background: #fafafa;
    color: #555;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.tab:hover{
    background: #f0f0f0;
}

.tab.active{
    background: #111827;
    color: white;
    border-color: #111827;
    font-weight: 600;
}

/* QUESTION CARD */
.qcard{
    background: #ffffff;
    border: 1px solid #e4e4e4;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    transition: 0.2s ease;
}

.qcard:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* QUESTION NUMBER */
.qnum{
    font-size: 12px;
    font-weight: 700;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* QUESTION TEXT */
.qtxt{
    font-size: 16px;
    line-height: 1.6;
    font-weight: 600;
    color: #222;
    margin-bottom: 16px;
}

/* OPTIONS */
.opts{
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.opt{
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid #dddddd;
    border-radius: 12px;
    background: #fafafa;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 14px;
    line-height: 1.5;
}

.opt:hover{
    background: #f2f2f2;
    border-color: #bdbdbd;
}

/* OPTION LETTER */
.ol{
    font-weight: 700;
    min-width: 18px;
    color: #333;
}

/* CORRECT / WRONG */
.opt.correct{
    background: #eaf7e9;
    border-color: #4CAF50;
    color: #2f6b32;
}

.opt.wrong{
    background: #fdecec;
    border-color: #d64545;
    color: #8f1f1f;
}

.opt.show-correct{
    background: #eaf7e9;
    border-color: #4CAF50;
    color: #2f6b32;
}

/* FEEDBACK */
.fb{
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
}

.fb.c{
    display: block;
    background: #eaf7e9;
    color: #2f6b32;
}

.fb.w{
    display: block;
    background: #fdecec;
    color: #8f1f1f;
}

/* RESPONSIVE */
@media (max-width: 768px){

    .qw{
        margin: 20px;
        padding: 18px;
    }

    .qtxt{
        font-size: 15px;
    }

    .opt{
        font-size: 13px;
    }

    .sbar{
        flex-direction: column;
        align-items: stretch;
    }

    .pbar{
        width: 100%;
    }
}
</style>

<script>
const Q=[
{s:'impl',q:'Which windowing system architecture offers maximum portability by placing the management role as a separate application?',o:['Each application manages all its own processes','Management embedded in the OS kernel','Management as a separate application','A monolithic server handling all clients'],a:2,e:'Placing management in a separate application decouples it from both the OS and individual apps, maximising portability.'},
{s:'impl',q:'In X Windows, which component enforces policies like tiled vs. overlapping windows and input focus?',o:['The X protocol server','The display device driver','A separate window manager client','The application toolkit layer'],a:2,e:'X Windows uses a separate window manager client to enforce those policies, keeping the core X server neutral.'},
{s:'impl',q:'The X protocol defines communication between which two parties?',o:['Operating system and device driver','Server and client applications','Window manager and toolkit','Kernel and display hardware'],a:1,e:'The X protocol specifies how the X server communicates with client applications.'},
{s:'impl',q:'Which imaging model associated with MacOS X and NextStep is listed as an alternative to pixel-based rendering?',o:['GKS','PHIGS','PostScript','OpenGL'],a:2,e:'PostScript is the image model used in MacOS X and NextStep, contrasting with pixel-based or GKS/PHIGS approaches.'},
{s:'impl',q:'What does "device independence" mean in the context of windowing systems?',o:['The window system works without any physical display','Applications program against an abstract terminal rather than specific hardware','Users can run the system on any internet-connected device','The OS kernel handles all device-specific rendering'],a:1,e:'Device independence means programmers target an abstract terminal device, letting the windowing system handle hardware specifics.'},
{s:'impl',q:'In the read-evaluation loop, how is a modal dialog box typically handled?',o:['By setting a global mode flag','By spawning a new process','By nesting an extra read-event loop','By switching to notification-based callbacks'],a:2,e:'Event-loop style handles modal dialogs by simply nesting another read-event loop, which is straightforward.'},
{s:'impl',q:'Why is a non-modal dialog box hard to implement with the read-evaluation (event-loop) approach?',o:['It requires object-oriented programming','The main loop becomes very complicated trying to handle concurrent events','Mode flags cannot be stored in global scope','Non-modal dialogs are unsupported by most windowing systems'],a:1,e:'Non-modal dialogs require handling concurrent interaction paths, making the event-loop extremely complicated.'},
{s:'impl',q:'The slide warns: "if you don\'t explicitly design it will just happen." What principle does this illustrate?',o:['Implementation should drive design','Notification-based systems are always safer','Implementation should NOT drive design','Toolkits always produce consistent interfaces'],a:2,e:'The warning is that without deliberate design, implementation choices accidentally define the interface — which is bad practice.'},
{s:'impl',q:'Which Java toolkit is described as notification-based and introduced callback objects in version 1.1?',o:['Swing','JavaFX','AWT','SWT'],a:2,e:'AWT (Abstract Windowing Toolkit) is notification-based; AWT 1.1 introduced callback objects instead of requiring subclassing.'},
{s:'impl',q:'Java Swing is built on top of which underlying toolkit?',o:['JavaFX','SWT','AWT','PHIGS'],a:2,e:'Swing is built on top of AWT and provides higher-level features, using MVC architecture.'},
{s:'impl',q:'What does UIMS stand for and what layer does it occupy?',o:['Unified Interface Management Standard — below toolkits','User Interface Management System — above toolkits','Universal Input Mapping Scheme — within the OS kernel','User Interaction Modeling System — alongside windowing systems'],a:1,e:'UIMS = User Interface Management System. It adds a layer above toolkits, making interface development accessible to non-programmers.'},
{s:'impl',q:'Which of the following is NOT a concern of UIMS?',o:['Conceptual architecture','Implementation techniques','Support infrastructure','Hardware device driver optimisation'],a:3,e:'UIMS concerns are conceptual architecture, implementation techniques, and support infrastructure — not hardware driver optimisation.'},
{s:'impl',q:'The Seeheim model contributes primarily as a:',o:['Runtime execution framework','Conceptual architecture for separating presentation, dialogue, and functionality','Hardware abstraction layer for windowing','Formal grammar for specifying user input'],a:1,e:'Seeheim\'s principal contribution is conceptual — it defines the separation of presentation, dialogue control, and application functionality.'},
{s:'impl',q:'In the Seeheim model, what is the role of the bypass/switch?',o:['It routes keyboard events to multiple windows','It enables direct communication between application and presentation for rapid semantic feedback','It translates lexical input to syntactic commands','It isolates dialogue control from the OS'],a:1,e:'The bypass allows direct app-to-presentation communication for rapid semantic feedback, regulated by dialogue control.'},
{s:'impl',q:'Which type of feedback corresponds to "menu item highlights"?',o:['Lexical','Semantic','Syntactic','Pragmatic'],a:2,e:'Menu highlights are syntactic feedback — they show the system has recognised a valid interaction without yet executing it.'},
{s:'impl',q:'Which type of feedback is described as typically slowest but sometimes needing to be rapid (e.g., freehand drawing)?',o:['Lexical','Syntactic','Semantic','Visual'],a:2,e:'Semantic feedback (e.g., a sum updating) is usually slower, but some applications like freehand drawing require rapid semantic feedback.'},
{s:'impl',q:'Mouse movement is an example of which feedback type?',o:['Semantic','Syntactic','Lexical','Pragmatic'],a:2,e:'Mouse movement is lexical feedback — the lowest level, showing raw physical input without interpretation.'},
{s:'impl',q:'MVC is described as largely a pipeline model. What breaks the clean separation in graphical interfaces?',o:['The model cannot store complex state','The view has no access to events','The controller must talk to the view because clicks only have meaning relative to what is displayed','The model directly updates the presentation'],a:2,e:'A mouse click\'s meaning depends on what is visible, forcing the controller to consult the view — breaking pure separation.'},
{s:'impl',q:'In MVC, what does the "model" component represent?',o:['How the component is rendered on screen','Processing of user input events','The internal logical state of the component','The communication layer between server and client'],a:2,e:'The model holds the internal logical state of the component, independent of how it is displayed or how input is processed.'},
{s:'impl',q:'How does PAC differ from MVC in the role of its mediating component?',o:['PAC\'s control component manages hierarchy and multiple views, not just input processing','PAC\'s control is identical to MVC\'s controller','PAC removes the need for a presentation component','PAC\'s abstraction replaces the MVC view'],a:0,e:'PAC\'s Control mediates between Presentation and Abstraction AND manages object hierarchy and multiple views — broader than MVC\'s controller.'},
{s:'impl',q:'Despite PAC being considered cleaner in many ways, which architecture is used more in practice (e.g., Java Swing)?',o:['Seeheim','Arch/Slinky','PAC','MVC'],a:3,e:'MVC is used more in practice despite PAC\'s theoretical advantages — Java Swing is the canonical example.'},
{s:'impl',q:'Arch/Slinky extends Seeheim by adding which distinction?',o:['It separates dialogue control from the OS kernel','It distinguishes lexical from physical layers, with different layers being more prominent in different systems','It adds a network layer for distributed interfaces','It merges dialogue and presentation into one layer'],a:1,e:'Arch/Slinky further differentiates lexical from physical layers, and like a slinky spring, different systems stretch different layers.'},
{s:'impl',q:'Graphical specification tools like Visual Basic are criticised for what limitation?',o:['They are too abstract for non-programmers','They make it hard to "see" all paths through the system, focusing only on what is visible on one screen','They cannot handle event-driven interactions','They require the programmer to write low-level device drivers'],a:1,e:'Graphical tools are locally focused — you see one screen at a time — making global paths through the system invisible.'},
{s:'impl',q:'Which technique for dialogue control specifies behaviour by stating what should be TRUE rather than what should happen?',o:['State transition diagrams','Grammar notations','Event languages','Constraints'],a:3,e:'Constraints are declarative — instead of specifying actions, you specify invariants that must hold, letting the system figure out how.'},
{s:'impl',q:'Resource sharing in windowing systems primarily refers to:',o:['Sharing fonts and image assets between applications','Achieving simultaneity of user tasks by supporting independent processes','Sharing CPU scheduler time between OS threads','Pooling network connections across clients'],a:1,e:'Resource sharing means the windowing system supports independent processes running simultaneously, isolating individual applications.'},
{s:'impl',q:'What is the "drift of dialogue control" concept describing?',o:['The tendency of event loops to slow down over time','The spectrum from internal control (inside the app) to presentation control (graphical specification)','The gradual migration of UI code to server-side rendering','The shift from keyboard-based to mouse-based interaction'],a:1,e:'Dialogue control can live internally (read-eval loop), externally (independent of app and presentation), or in the presentation (graphical spec).'},
{s:'impl',q:'Which of the following is a non-UIMS term for essentially the same concept as UIMS?',o:['Toolkit abstraction layer','UI development environment (UIDE) or UI development system (UIDS)','Interaction object framework','Widget management protocol'],a:1,e:'UIDS (UI Development System) and UIDE (UI Development Environment) are alternative terms for UIMS — Visual Basic is cited as an example.'},
{s:'impl',q:'The three layers of development tools for programmers in HCI are, from lowest to highest:',o:['Toolkits → Windowing systems → UIMS','Windowing systems → Toolkits → UIMS','UIMS → Toolkits → Windowing systems','Windowing systems → UIMS → Toolkits'],a:1,e:'The hierarchy goes: windowing systems (hardware abstraction) → toolkits (interaction objects) → UIMS (architecture and dialogue).'},
{s:'impl',q:'What benefit does the UIMS conceptual separation of presentation from application semantics provide?',o:['Faster rendering on all hardware','Portability, reusability, multiple interfaces, and customisability','Simpler event-loop logic','Reduced need for toolkits'],a:1,e:'Separation improves: portability (runs on different systems), reusability (reuse components), multiple interfaces (same functionality, different UIs), and customisability.'},
{s:'impl',q:'AWT 1.0 required programmers to do what to handle events, which was improved in AWT 1.1?',o:['Write assembly-level device handlers','Subclass basic widgets to handle events; 1.1 introduced callback objects instead','Register global event listeners at OS level','Use state machine notations for all event handling'],a:1,e:'AWT 1.0 required subclassing; AWT 1.1 introduced callback (listener) objects, making event handling more flexible.'},
{s:'impl',q:'Which PHIGS abbreviation stands for Programmers\' Hierarchical Interface to Graphics?',o:['PHIGS is purely a pixel-based model','It is the PostScript variant for hierarchical graphics','PHIGS = Programmers\' Hierarchical Interface to Graphics, an image model alternative to PostScript','PHIGS is a windowing system architecture, not an image model'],a:2,e:'PHIGS stands for Programmers\' Hierarchical Interface to Graphics — one of the listed image models alongside pixels, PostScript, and GKS.'},

{s:'design',q:'Which type of design rule has the highest authority but the most limited application?',o:['Principles','Guidelines','Standards','Design patterns'],a:2,e:'Standards (set by national/international bodies) have high authority but limited, specific application.'},
{s:'design',q:'According to the design rules typology, principles are characterised by:',o:['High authority and limited application','High authority and high generality','Low authority and high generality','Low authority and limited application'],a:2,e:'Principles sit at the high-generality / low-authority end of the spectrum — broadly applicable but not mandatory.'},
{s:'design',q:'Synthesizability as a learnability principle means:',o:['Transferring knowledge from one system to a new one','Assessing the effect of past actions on the current system state','Predicting future system behaviour from past interactions','Ensuring consistent input/output behaviour across tasks'],a:1,e:'Synthesizability = being able to assess the effect of past actions. It relates to "immediate vs. eventual honesty."'},
{s:'design',q:'Predictability differs from synthesizability in that predictability concerns:',o:['Past actions; synthesizability concerns future actions','Future actions based on past history; synthesizability concerns assessing the effect of past actions','Lexical-level feedback; synthesizability concerns semantic-level feedback','Novel tasks; synthesizability concerns familiar tasks'],a:1,e:'Predictability = determining the effect of FUTURE actions from past history. Synthesizability = assessing the effect of PAST actions.'},
{s:'design',q:'Familiarity as a learnability principle is closely linked to which concept?',o:['Task migratability','Affordance and guessability','Forward/backward recovery','Dialogue initiative'],a:1,e:'Familiarity is about how prior knowledge applies to a new system — related to affordance (the interface suggests its own use) and guessability.'},
{s:'design',q:'Generalizability in learnability refers to:',o:['Ensuring all users reach the same performance level','Extending specific interaction knowledge to new situations','Providing shortcuts for expert users','Reducing the system\'s memory demands on users'],a:1,e:'Generalizability = extending specific interaction knowledge to new situations beyond what was originally learned.'},
{s:'design',q:'Which flexibility principle addresses the ability to pass responsibility for a task between user and system?',o:['Multithreading','Substitutivity','Task migratability','Dialogue initiative'],a:2,e:'Task migratability = passing responsibility for task execution between the user and the system.'},
{s:'design',q:'Substitutivity as a flexibility principle allows:',o:['The system to substitute one task for another without user awareness','Equivalent values of input and output to be substituted for each other — representation multiplicity','Users to substitute one interaction modality for another at the hardware level','The dialogue controller to substitute default values for missing input'],a:1,e:'Substitutivity = allowing equivalent input/output values to be swapped — e.g., typing a colour name vs. picking it from a palette.'},
{s:'design',q:'Observability as a robustness principle is concerned with:',o:['How quickly the system responds to user input','The ability of the user to evaluate the internal state of the system from its perceivable representation','How thoroughly the system logs user actions','Whether the system meets all task requirements'],a:1,e:'Observability = users can infer the system\'s internal state from what they perceive — related to browsability, defaults, and persistence.'},
{s:'design',q:'Commensurate effort is a sub-concept of which robustness principle?',o:['Observability','Task conformance','Responsiveness','Recoverability'],a:3,e:'Commensurate effort is part of Recoverability — the cost of correcting an error should be proportional to the severity of the mistake.'},
{s:'design',q:'Task adequacy, a sub-concept of task conformance, means:',o:['The system completes all tasks without user input','The system\'s services are well-suited to support users\' tasks, not just that they cover them','The system confirms task completion with explicit feedback','Tasks can be transferred between the user and system'],a:1,e:'Task adequacy asks whether the system supports tasks WELL (appropriately), while task completeness asks whether it covers ALL tasks.'},
{s:'design',q:'ISO 9241 defines usability as effectiveness, efficiency, and:',o:['Learnability','Memorability','Satisfaction','Consistency'],a:2,e:'ISO 9241 defines usability as effectiveness, efficiency, and satisfaction with which users accomplish tasks.'},
{s:'design',q:'Which collection of design rules is associated with Ben Shneiderman?',o:['7 Principles','10 Heuristics','8 Golden Rules','6 Design Maxims'],a:2,e:'Shneiderman\'s 8 Golden Rules are the collection attributed to him, covering consistency, shortcuts, feedback, closure, error handling, reversal, control, and memory.'},
{s:'design',q:'Shneiderman\'s Rule 4 "Design dialogs to yield closure" means:',o:['Every dialog box must have a Cancel button','Sequences of actions should have a clear beginning, middle, and end with informative feedback at completion','The system should close inactive windows automatically','Users should be able to close any dialog without saving'],a:1,e:'Closure means action sequences have a recognisable end, giving users a sense of completion and relief.'},
{s:'design',q:'Shneiderman\'s Rule 7 "Support internal locus of control" means:',o:['The system should auto-complete user actions where possible','Users should feel they are in charge and that the system responds to their actions, not the reverse','All system functions should be accessible from a single central menu','The dialogue controller should reside inside the application, not externally'],a:1,e:'Internal locus of control means users feel they initiate actions and the system responds — users are in control, not vice versa.'},
{s:'design',q:'Norman\'s Principle 3 is "Make things visible: bridge the gulfs of Execution and Evaluation." What are these two gulfs?',o:['The gap between user skill and system complexity; the gap between input speed and processing speed','The gulf of execution (difficulty translating intentions into actions) and the gulf of evaluation (difficulty interpreting system state)','The gap between designers and users; the gap between prototypes and final products','The gap between lexical and semantic feedback; the gap between input and output modalities'],a:1,e:'The gulf of execution = difficulty translating goals into system actions. The gulf of evaluation = difficulty interpreting what the system state means.'},
{s:'design',q:'Norman\'s Principle 1 states "Use both knowledge in the world and knowledge in the head." What does knowledge in the world mean?',o:['Documentation stored in the user manual','Perceivable cues in the environment/interface that guide behaviour without relying on memory','The system\'s internal database of user preferences','Prior training users received before using the system'],a:1,e:'Knowledge in the world = information embedded in the environment or interface itself (labels, affordances), reducing reliance on memory.'},
{s:'design',q:'"When all else fails, standardize" is which number in Norman\'s 7 Principles?',o:['3','5','6','7'],a:3,e:'Norman\'s Principle 7 is "When all else fails, standardize" — if a natural mapping cannot be found, impose a standard.'},
{s:'design',q:'Which of the following is Shneiderman\'s Rule 2?',o:['Offer informative feedback','Strive for consistency','Enable frequent users to use shortcuts','Reduce short-term memory load'],a:2,e:'Rule 2 is "Enable frequent users to use shortcuts" — abbreviations, function keys, and macros for expert users.'},
{s:'design',q:'A design pattern originates from whose work in architecture?',o:['Norman','Nielsen','Alexander','Shneiderman'],a:2,e:'Design patterns in HCI were inspired by Christopher Alexander\'s work on architectural patterns.'},
{s:'design',q:'Which statement best describes a "pattern language" in the context of HCI design patterns?',o:['A formal grammar for specifying interface behaviour','A set of linked patterns that together enable generation of complete designs','A visual notation for drawing UI wireframes','A standardised coding template for widget libraries'],a:1,e:'A pattern language links individual patterns so that applying one guides you to related patterns, supporting complete, coherent designs.'},
{s:'design',q:'Which characteristic of design patterns states they "embody values and can express what is humane in interface design"?',o:['They capture design practice not theory','They represent knowledge at varying levels (social to detailed)','They are intuitive, readable, and usable for stakeholder communication','They embody values and express what is humane in interface design'],a:3,e:'One of the listed characteristics of HCI patterns is that they embody values — they can express what is humane, not just what is efficient.'},
{s:'design',q:'Abstract guidelines (principles) are most applicable during which phase of the design lifecycle?',o:['Late-stage coding and unit testing','Early life cycle activities','Integration and testing','Post-deployment maintenance'],a:1,e:'Abstract guidelines apply early in the lifecycle (requirements, conceptual design), before detailed decisions are made.'},
{s:'design',q:'Why do standards require "slowly changing technology" according to the slides?',o:['Standards are written in formal language that takes time to update','Standards need a stable technical foundation so they remain valid across a wide community of designers over time','Standards are controlled by government agencies with slow approval processes','Standards must be backward-compatible with all previous hardware versions'],a:1,e:'Standards need sound underlying theory AND slowly changing technology so they stay applicable across a large community over time.'},
{s:'design',q:'The principle of Consistency in learnability means:',o:['The system looks visually identical on all platforms','Likeness in input/output behaviour arising from similar situations or task objectives','All users perform tasks in the same number of steps','Error messages are always displayed in the same location'],a:1,e:'Consistency = similar situations or task objectives produce similar input/output behaviour, enabling transfer of learning.'},
{s:'design',q:'Responsiveness as a robustness principle is defined as:',o:['The system\'s ability to recover from errors without data loss','How the user perceives the rate of communication with the system','Whether the system completes all user tasks accurately','The speed at which the system processes background computations'],a:1,e:'Responsiveness = how the user perceives the rate of communication — not raw speed, but the perceived interaction tempo.'},
{s:'design',q:'Adaptivity as part of customizability refers to:',o:['The user modifying the interface to their preference','The system automatically modifying the interface based on usage patterns','Designers providing multiple interface themes','The system reverting to default settings after each session'],a:1,e:'Adaptivity = the system modifies itself. Adaptability = the user modifies it. Customizability encompasses both.'},
{s:'design',q:'Which of Nielsen\'s collections is referenced as an alternative set of heuristics alongside Shneiderman\'s and Norman\'s rules?',o:['6 usability heuristics','8 design principles','10 heuristics','12 interaction guidelines'],a:2,e:'Nielsen\'s 10 Heuristics are mentioned alongside Shneiderman\'s 8 Golden Rules and Norman\'s 7 Principles as "golden rules and heuristics."'},
{s:'design',q:'What does the slides mean by "understanding the justification for guidelines aids in resolving conflicts"?',o:['Knowing who wrote the guideline tells you which to prioritise','Understanding why a guideline exists helps you decide which to follow when two guidelines contradict each other','All conflicts between guidelines are resolved by deferring to standards','Justifications are required by ISO for all published guidelines'],a:1,e:'When two guidelines conflict, knowing the reasoning behind each helps you judge which is more important in your specific context.'},
{s:'design',q:'Reachability is listed as a sub-concept of which two robustness principles?',o:['Recoverability and task conformance','Observability and recoverability','Responsiveness and stability','Task conformance and responsiveness'],a:1,e:'Reachability appears under both Observability (can you reach/browse all system states?) and Recoverability (can you return to a safe state?).'},

{s:'sw',q:'What distinguishes verification from validation in the software lifecycle?',o:['Verification tests the final product; validation tests prototypes','Verification = designing the product correctly; validation = designing the correct product','Verification is done by users; validation by developers','Verification comes after deployment; validation before coding'],a:1,e:'Verification = "are we building the product right?" (correctness). Validation = "are we building the right product?" (meeting real needs).'},
{s:'sw',q:'The "formality gap" refers to:',o:['The missing documentation between architectural and detailed design','The difference between formal theory/requirements and the messy constraints of real-world practice','The gap in formal training between HCI researchers and practising designers','The number of unspecified requirements in a typical project'],a:1,e:'The formality gap is the distance between ideally formal specifications and real-world constraints — theory vs. practice.'},
{s:'sw',q:'Why is a strictly linear waterfall model inappropriate for interactive system design?',o:['It is too expensive for small organisations','Interaction design requires extensive feedback between stages, not a linear sequence','It does not include usability testing phases','It was designed for hardware, not software systems'],a:1,e:'Interactive systems require constant feedback between stages — the waterfall\'s linear flow cannot accommodate this.'},
{s:'sw',q:'A usability specification\'s "now level" describes:',o:['The performance achieved by the current planned design','The current state of existing products — what usability level exists today before redesign','The minimum acceptable usability level for release','The best known usability level achieved by any competitor'],a:1,e:'The "now level" captures the current baseline — what existing products achieve, or "no current product allows this" if nothing exists yet.'},
{s:'sw',q:'A usability specification\'s "worst case" level means:',o:['The lowest usability level the team expects to achieve','The absolute minimum the product must meet to avoid project failure','The worst usability level that would still be acceptable for release','The performance of the poorest-quality competing product'],a:2,e:'Worst case = the absolute floor — below this, the product is unacceptable. It is the minimum threshold for release.'},
{s:'sw',q:'According to the slides, which of the following is a problem with usability specifications?',o:['They cannot be measured quantitatively','They require a level of detail that may not be possible early in design','They are only applicable to hardware products','They replace the need for iterative prototyping'],a:1,e:'Usability specs need detail about what to measure, but early in design you may not yet know enough to specify this precisely.'},
{s:'sw',q:'Design rationale is best defined as:',o:['A formal notation for specifying user interfaces','Information that explains WHY a system is the way it is','A visual design guideline applied during UI development','The usability test results gathered after system deployment'],a:1,e:'Design rationale captures the reasoning behind design decisions — not just what was built, but why those choices were made.'},
{s:'sw',q:'Which benefit of design rationale involves helping future designers understand decisions made in previous product versions?',o:['Enforces design discipline','Presents arguments for design trade-offs','Communication throughout the life cycle','Reuse of design knowledge across products'],a:3,e:'"Reuse of design knowledge across products" means future designers can learn from past decisions without repeating the same deliberation.'},
{s:'sw',q:'In IBIS, "positions" are defined as:',o:['The stakeholders involved in a design decision','Potential resolutions to an issue','Formal arguments that modify relationships between issues and resolutions','Sub-issues derived from a root issue'],a:1,e:'Positions in IBIS are potential resolutions to an issue — they propose answers to the questions raised.'},
{s:'sw',q:'In IBIS, what role do "arguments" play?',o:['They define new root issues','They modify the relationship between positions and issues (supporting or objecting to positions)','They replace issues once a decision is reached','They represent stakeholder viewpoints without modifying relationships'],a:1,e:'Arguments modify relationships — they can support or object to a position, shaping how issues and positions relate.'},
{s:'sw',q:'QOC stands for Questions, Options, Criteria. What do "criteria" represent?',o:['The constraints imposed by business requirements','The means to assess the options in order to make a choice','The sub-questions derived from a main question','The stakeholders whose needs must be satisfied'],a:1,e:'Criteria in QOC are the standards used to evaluate and compare options — they guide the final choice.'},
{s:'sw',q:'How does DRL relate to QOC?',o:['DRL is a simplified version of QOC for smaller projects','DRL is similar to QOC but has a larger language and more formal semantics','DRL replaces criteria with constraints, unlike QOC','DRL is process-oriented while QOC is structure-oriented'],a:1,e:'DRL (Design Rationale Language) is similar to QOC but offers a richer vocabulary and more formal semantics for capturing design decisions.'},
{s:'sw',q:'Throw-away prototyping is characterised by:',o:['The prototype evolves iteratively into the final product','Separate components are built independently and integrated later','The prototype is built and tested to gain knowledge, then discarded — not used as a base for the final product','The prototype is handed to users permanently before the full system is ready'],a:2,e:'Throw-away prototyping uses the prototype only to gain design knowledge — the prototype itself is then discarded.'},
{s:'sw',q:'Incremental prototyping means:',o:['The final product is built as separate independent components one at a time, with one overall design','The prototype evolves from a minimal version through iterations into the final product','Multiple prototypes are built simultaneously and compared','Paper prototypes are incrementally replaced with digital ones'],a:0,e:'Incremental prototyping: there is one overall design, but it is built in independent partitions/components, one at a time.'},
{s:'sw',q:'In evolutionary prototyping, what is the key distinction from throw-away?',o:['Evolutionary prototypes are always paper-based','The evolutionary prototype is NOT discarded — it serves as the basis for the next iteration and eventually becomes the final system','Evolutionary prototyping skips architectural design','Evolutionary prototyping is only used for non-functional requirements'],a:1,e:'Evolutionary prototype = the prototype is never thrown away. It evolves through iterations into the actual released system.'},
{s:'sw',q:'The Wizard of Oz technique involves:',o:['Animated storyboards demonstrated to users','A hidden human operator simulating system responses while users interact as if with a real system','Automated test scripts that simulate user interactions','A design review process involving stakeholders from multiple roles'],a:1,e:'In Wizard of Oz, a hidden human (the wizard) provides responses that make users believe they are interacting with a real, functioning system.'},
{s:'sw',q:'Storyboards as a prototyping technique are noted for which characteristic?',o:['They always require computer simulation','They need not be computer-based and can be animated','They are only used for throw-away prototyping','They require specialist HCI software to create'],a:1,e:'Storyboards are flexible — they need not be computer-based, and they can be animated to simulate interaction sequences.'},
{s:'sw',q:'Design inertia in iterative design means:',o:['Adding too many iterations slows development to a halt','Early bad design decisions tend to persist through iterations rather than being corrected','Users become resistant to interface changes after repeated exposure','Iterative prototypes grow too large to refactor'],a:1,e:'Design inertia = early poor decisions get baked in and persist, even through multiple iterations — a key risk of iterative design.'},
{s:'sw',q:'Psychological design rationale is intended to support the "task-artefact cycle." What does this cycle capture?',o:['Tasks are fully specified before any artefact is designed','User tasks and the systems they use mutually influence each other — tools shape tasks and tasks drive new design','Artefacts are tested against psychological models of cognition before release','Psychological claims replace usability specifications in later lifecycle stages'],a:1,e:'The task-artefact cycle recognises that tools shape the tasks users perform, and those tasks in turn drive the design of new tools.'},
{s:'sw',q:'Psychological design rationale makes explicit the "psychological claims" of a system. What does this mean?',o:['The system\'s privacy policy as perceived by users','The positive AND negative consequences of design decisions for users\' cognitive and task experience','The formal psychological test scores from usability studies','The system\'s compliance with mental health legislation'],a:1,e:'Psychological claims = explicit positive and negative consequences of design for users — including unintended negative side-effects that can inform next-iteration improvements.'},
{s:'sw',q:'Which ISO/IEC 25010 criterion asks "Does the system do what it is supposed to do?"',o:['Usability','Reliability','Functional suitability','Maintainability'],a:2,e:'Functional suitability = does the system provide functions that meet stated and implied needs — does it do what it\'s supposed to?'},
{s:'sw',q:'Which ISO/IEC 25010 criterion is concerned with time, memory, and resource use?',o:['Reliability','Performance efficiency','Compatibility','Portability'],a:1,e:'Performance efficiency = how well the system uses time (response speed), memory, and other resources under stated conditions.'},
{s:'sw',q:'Which ISO/IEC 25010 criterion addresses whether data is protected from unauthorised access?',o:['Reliability','Maintainability','Portability','Security'],a:3,e:'Security = the system protects information and data so that people or systems have the appropriate degree of access.'},
{s:'sw',q:'Which ISO/IEC 25010 criterion asks "Can it run on different devices or platforms?"',o:['Compatibility','Usability','Portability','Reliability'],a:2,e:'Portability = the degree to which a system can be transferred and operated in different environments and platforms.'},
{s:'sw',q:'The architectural design activity in the software lifecycle involves:',o:['Writing unit tests for individual modules','Factoring the system into major components and specifying their interrelationships','Refining components into separately implementable modules','Gathering user requirements through interviews and task analysis'],a:1,e:'Architectural design = high-level decomposition of the system into major components and how they interrelate, satisfying both functional and non-functional requirements.'},
{s:'sw',q:'Integration and testing in the lifecycle is described as:',o:['Verifying that individual functions work in isolation','Combining implemented and unit-tested components as per the architectural design and testing correct behaviour of the combined system','Writing acceptance tests from user requirements','Deploying the system to production and monitoring for failures'],a:1,e:'Integration and testing = assembling individually tested components according to the architecture and verifying correct combined behaviour and acceptable resource use.'},
{s:'sw',q:'Issue-Based Information System (IBIS) is described as which type of design rationale?',o:['Structure-oriented','Post-hoc analysis-oriented','Process-oriented','Evaluation-oriented'],a:2,e:'IBIS is process-oriented — it preserves the order of deliberation and decision-making as it actually happened.'},
{s:'sw',q:'Design space analysis (QOC) is described as which type of design rationale?',o:['Process-oriented','Structure-oriented — emphasising post-hoc structuring of considered alternatives','Evaluation-oriented','Scenario-based'],a:1,e:'QOC/design space analysis is structure-oriented — it organises design alternatives retrospectively into a clear question-option-criteria structure.'},
{s:'sw',q:'Which management issue is specifically mentioned as a challenge when using prototyping?',o:['Prototypes always exceed the final product budget','Contracts may not accommodate the iterative, exploratory nature of prototyping','Prototypes cannot demonstrate non-trivial functionality','Legal liability for prototype failures must be assigned before testing'],a:1,e:'Contracts are written for defined deliverables, but prototyping is exploratory — this mismatch is a real management challenge.'},
{s:'sw',q:'What does the slides say is important to diagnose in prototypes beyond just symptoms?',o:['Performance bottlenecks in rendering code','Real underlying usability problems, not just the symptoms that appear during testing','Visual design inconsistencies across screens','Compatibility issues with target hardware platforms'],a:1,e:'The warning: diagnose the REAL usability problems in prototypes, not just the surface symptoms — addressing only symptoms leaves root causes unresolved.'},
{s:'sw',q:'"Capturing contextual information" is listed as a benefit of design rationale. What does this mean?',o:['Recording the physical location where design meetings were held','Preserving the constraints, alternatives considered, and reasons that existed at the time of a design decision','Documenting the hardware context in which the system will be deployed','Storing screenshots of the interface at each design stage'],a:1,e:'Contextual capture = preserving the constraints, rejected alternatives, and situational factors that influenced a decision — invaluable for future maintainers.'},
];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
let qs=[],st={ans:0,cor:0,tot:0},curSec='all';

function prep(sec){
  const pool=sec==='all'?Q:Q.filter(x=>x.s===sec);
  return shuffle(pool).map(q=>{
    const idx=[0,1,2,3],sh=shuffle(idx);
    return{...q,opts:sh.map(i=>q.o[i]),ans:sh.indexOf(q.a)};
  });
}

function build(sec){
  qs=prep(sec);st={ans:0,cor:0,tot:qs.length};upd();
  const sn={impl:'Implementation Support',design:'Design Rules',sw:'Software Process'};
  let h='';let last=null;
  qs.forEach((q,i)=>{
    if(sec==='all'&&q.s!==last){
      last=q.s;
      const cnt=qs.filter(x=>x.s===q.s).length;
      h+=`<div class="sec-hdr">${sn[q.s]}</div><div class="sec-sub">${cnt} questions</div>`;
    }
    const L=['A','B','C','D'];
    h+=`<div class="qcard" id="c${i}"><div class="qnum">Question ${i+1}</div><div class="qtxt">${q.q}</div><div class="opts" id="o${i}">`;
    q.opts.forEach((op,j)=>h+=`<div class="opt" id="op${i}_${j}" onclick="ans(${i},${j})"><span class="ol">${L[j]}.</span>${op}</div>`);
    h+=`</div><div class="fb" id="f${i}"></div></div>`;
  });
  document.getElementById('qc').innerHTML=h;
}

function ans(qi,oi){
  const q=qs[qi];
  const card=document.getElementById('c'+qi);
  if(card.dataset.done)return;
  card.dataset.done='1';
  document.querySelectorAll('#o'+qi+' .opt').forEach(o=>o.style.pointerEvents='none');
  st.ans++;
  const fb=document.getElementById('f'+qi);
  if(oi===q.ans){
    st.cor++;
    document.getElementById('op'+qi+'_'+oi).classList.add('correct');
    fb.textContent='Correct! '+q.e;fb.className='fb c';
  }else{
    document.getElementById('op'+qi+'_'+oi).classList.add('wrong');
    document.getElementById('op'+qi+'_'+q.ans).classList.add('show-correct');
    fb.textContent='Incorrect. Correct answer is '+['A','B','C','D'][q.ans]+'. '+q.e;fb.className='fb w';
  }
  upd();
}

function upd(){
  document.getElementById('sd').textContent=st.cor+' / '+st.ans+' answered';
  document.getElementById('pb').style.width=(st.tot>0?Math.round(st.ans/st.tot*100):0)+'%';
}

function show(sec,btn){
  curSec=sec;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  build(sec);
}

function reset(){build(curSec)}

build('all');
</script>
